<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Landing Page</title>

    <link rel="stylesheet" href="main.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <nav class="navbar">
        <div class="logo">Thala <span>7.</span></div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li>
                <a href="#">
                    Brands <i class="fa-solid fa-chevron-down"></i>
                </a>
            </li>
            <li>
                <a href="#">
                    More <i class="fa-solid fa-chevron-down"></i>
                </a>
            </li>
            <li><a href="#">Contact</a></li>
        </ul>

        <div class="nav-icons">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Search">
            </div>
            <div class="cart">
                <i class="fa-solid fa-bag-shopping"></i>
                <span class="cart-count">0</span>
            </div>
            <img src="./image/profile.jpg" alt="profile" class="profile-img">
        </div>
    </nav>

    <section class="hero">
        <!-- Grid overlay pattern built directly into layout -->
        <div class="grid-lines"></div>
        
        <div class="left">
            <h3 class="brand-name">SEVEN<span>BY MS DHONI</span></h3>
            <h1>
                7!! Thala For
                <br>
                a <span>Reason!</span>
            </h1>
            <p class="description">
                Lorem ipsum dolor sit amet consectetur.
                <br>
                Pretium quisque lorem feugiat justo at ut orci
                <br>
                nisi.
            </p>
            <a href="product.html" class="cta-link">
                <button class="btn-shop">Shop Now</button>
            </a>
        </div>

        <div class="right">
            <!-- Split right-background design placeholder -->
            <div class="bg-overlay-side"></div>
            <img src="image/shoe_main.png" alt="shoe" class="main-shoe">
            <div class="badge-a">A</div>
        </div>
    </section>

    <!-- Bottom Features Bar from image_85cba9.png -->
    <footer class="stats-bar">
        <div class="stat-item">
            <i class="fa-regular fa-comment-dots"></i>
            <div>
                <h3>2k+</h3>
                <p>Reviews</p>
            </div>
        </div>
        <div class="stat-item">
            <i class="fa-solid fa-users"></i>
            <div>
                <h3>30k+</h3>
                <p>Customers</p>
            </div>
        </div>
        <div class="stat-item">
            <i class="fa-regular fa-star-half-stroke"></i>
            <div>
                <h3>High</h3>
                <p>Quality</p>
            </div>
        </div>
        <div class="stat-item">
            <i class="fa-solid fa-star-bounce"></i>
            <div>
                <h3>4.5/5</h3>
                <p>Rating</p>
            </div>
        </div>
    </footer>
</body>
</html>
